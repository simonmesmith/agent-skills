<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codex Draw</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand">
        <img class="brand-mark" src="/static/codex-draw-icon.png" alt="" aria-hidden="true">
        <span>Codex Draw</span>
      </div>
      <div class="status" id="status">Loading...</div>
      <button class="header-icon-button" id="newButton" aria-label="New drawing" title="New drawing" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3.5h8l4 4V20.5H6z"/><path d="M14 3.5v4h4"/><path d="M12 11v6"/><path d="M9 14h6"/></svg>
      </button>
      <button class="header-icon-button" id="exportButton" aria-label="Export SVG" title="Export SVG" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4v10"/><path d="M8 10l4 4 4-4"/><path d="M5 19h14"/></svg>
      </button>
    </header>

    <section class="workspace">
      <aside class="toolbar" aria-label="Drawing tools">
        <button class="tool active" data-tool="select" aria-label="Select" title="Select" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3l12 9-6 1.3 3.2 6.2-2.7 1.4-3.2-6.1L4 19z"/></svg>
        </button>
        <button class="tool" data-tool="rect" aria-label="Rectangle" title="Rectangle" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="6" width="14" height="12" rx="1.5"/></svg>
        </button>
        <button class="tool" data-tool="ellipse" aria-label="Ellipse" title="Ellipse" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><ellipse cx="12" cy="12" rx="7" ry="5.5"/></svg>
        </button>
        <button class="tool" data-tool="line" aria-label="Line" title="Line" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 18L19 6"/></svg>
        </button>
        <button class="tool" data-tool="arrow" aria-label="Arrow" title="Arrow" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 17L18 6"/><path d="M11 6h7v7"/></svg>
        </button>
        <button class="tool" data-tool="text" aria-label="Text" title="Text" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 6h14M12 6v12M9 18h6"/></svg>
        </button>
        <button class="tool danger hidden" id="deleteButton" aria-label="Delete selected" title="Delete selected" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 7h12M10 7V5h4v2M8 7l1 12h6l1-12"/></svg>
        </button>
      </aside>

      <div class="canvas-wrap">
        <svg id="canvas" class="canvas" role="img" aria-label="Drawing canvas"></svg>
      </div>

      <aside class="panel">
        <section>
          <h2>Style</h2>
          <div class="field-grid style-grid">
            <label>Fill <input id="fillInput" type="color"></label>
            <label>Opacity <input id="opacityInput" type="number" min="0" max="1" step="0.05"></label>
            <label>Stroke <input id="strokeInput" type="color"></label>
            <label>Stroke width <input id="strokeWidthInput" type="number" min="0" max="40" step="1"></label>
          </div>
        </section>

        <section>
          <h2>Geometry</h2>
          <div class="field-grid geometry-grid">
            <label>X <input id="xInput" type="number" step="1"></label>
            <label>Y <input id="yInput" type="number" step="1"></label>
            <label>W <input id="widthInput" type="number" min="1" step="1"></label>
            <label>H <input id="heightInput" type="number" min="1" step="1"></label>
            <label><span class="geometry-symbol">θ°</span><input id="rotationInput" type="number" min="-360" max="360" step="1"></label>
          </div>
        </section>

        <section>
          <div class="panel-heading">
            <h2>Objects</h2>
          </div>
          <ol class="objects" id="objects"></ol>
        </section>
      </aside>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
